<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FotoMapa PWA</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <main class="container">
    <h1>FotoMapa PWA</h1>
    <p>Zapisuj punkty terenowe i pokazuj je na mapie.</p>

    <form id="entryForm">
      <label for="titleInput">Tytuł</label>
      <input id="titleInput" required>

      <label for="descInput">Opis</label>
      <textarea id="descInput"></textarea>

      <label for="photoInput">Zdjęcie</label>
      <input id="photoInput" type="file" accept="image/*" capture="environment">
      <img id="photoPreview" alt="Podgląd zdjęcia" hidden>

      <button type="submit">Zapisz</button>
    </form>

    <section>
      <h2>Mapa</h2>
      <div id="map"></div>
    </section>

    <section>
      <h2>Wpisy</h2>
      <div id="entriesList"></div>
    </section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
